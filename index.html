---
layout: default
title: Today
---

{% assign latest_post = site.posts.first %}

{% if latest_post %}
  <article class="post">
    <header class="post-header">
      <time class="post-date">{{ latest_post.date | date: "%d/%m/%Y" }}</time>
    </header>

    <div class="post-content">
      {{ latest_post.content }}
    </div>
  </article>

  <div class="archive-footer-link">
    <a href="{{ '/archive/' | relative_url }}">← Consulta tutte le uscite precedenti nell'archivio</a>
  </div>
{% endif %}
