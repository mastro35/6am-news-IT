---
layout: default
title: Today
---

{% assign latest_post = site.posts.first %}

{% if latest_post %}
  <!-- IL NOTIZIARIO DI OGGI -->
  <article class="latest-news">
    <div class="post-meta">{{ latest_post.date | date: "%d %B %Y" }}</div>
        
    <div class="post-content" style="margin-top: 2rem;">
      {{ latest_post.content }}
    </div>
  </article>
{% else %}
  <p>non c'è nulla da vedere qui, circolare!</p>
{% endif %}
